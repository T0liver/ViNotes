name: Tag on Release PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - release

jobs:
  tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Read version from Gradle
        id: version
        run: |
          grep "versionName" app/build.gradle.kts | awk '{print $3}' | tr -d \" >> $GITHUB_OUTPUT

      - name: Push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.name }}
          git push origin ${{ steps.version.outputs.name }}