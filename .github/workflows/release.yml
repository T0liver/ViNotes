name: Release

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - release

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # Signing setup
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Writing gradle.properties
        run: |
          echo "org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m" > gradle.properties

      - name: Build signed APK & AAB
        run: ./gradlew assembleRelease bundleRelease --no-daemon --stacktrace
        env:
          SIGNING_KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Release Version
        id: get_version
        run: |
          VERSION=$(grep "versionName" app/build.gradle.kts | awk '{print $3}' | tr -d \")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        
      - name: Check if Tag Exists and Modify
        id: f_tag
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          git fetch --tags --prune
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "TAG_EXISTS=true" >> $GITHUB_OUTPUT
            new_version="${VERSION}-build-${{ github.run_number }}"
            echo "VERSION=$new_version" >> $GITHUB_OUTPUT
          else
            echo "TAG_EXISTS=false" >> $GITHUB_OUTPUT
            # keep original version
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: ./

      - name: Rename APK and AAB with version
        run: |
          apk_path=$(find . -type f -name "*.apk" -print -quit || true)
          aab_path=$(find . -type f -name "*.aab" -print -quit || true)
          VERSION="${{ steps.f_tag.outputs.VERSION }}"
          if [ -n "$apk_path" ]; then
            mv "$apk_path" "vinotes-v${VERSION}.apk"
          else
            echo "No APK found to rename"
          fi
          if [ -n "$aab_path" ]; then
            mv "$aab_path" "vinotes-v${VERSION}.aab"
          else
            echo "No AAB found to rename"
          fi

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "vinotes-v${{ steps.f_tag.outputs.VERSION }}.apk,vinotes-v${{ steps.f_tag.outputs.VERSION }}.aab"
          tag: v${{ steps.f_tag.outputs.VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}